<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambiente de Teste Manual - Coupon API</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1 style="background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem;">Ambiente de Teste Manual</h1>
                <p style="color: var(--text-muted); font-size: 0.8rem">Utilize este painel para validar as regras de negócio da API</p>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Filtrar por código...">
                </div>
                <button class="btn btn-primary" onclick="openCreateModal()">+ Criar Cupom</button>
            </div>
        </header>

        <div class="coupon-grid" id="couponGrid">
            <!-- Gerado via JS -->
        </div>
    </div>

    <!-- Modal Criar -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <h2 style="margin-bottom: 1.5rem">Novo Cupom de Teste</h2>
            <form id="createForm">
                <div class="form-group"><label>Código Alfanumérico</label><input name="code" placeholder="Ex: TESTE" maxlength="6" style="text-transform: uppercase" required></div>
                <div class="form-group"><label>Valor de Desconto</label><input type="number" step="0.01" name="discountValue" placeholder="0.00" required></div>
                <div class="form-group"><label>Data de Expiração</label><input type="date" name="expirationDate" required></div>
                <div class="actions" style="justify-content: flex-end; margin-top: 2rem">
                    <button type="button" class="btn btn-outline" onclick="closeModals()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Validar e Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Editar -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2 style="margin-bottom: 1.5rem">Atualizar Dados</h2>
            <form id="editForm">
                <div class="form-group"><label>Novo Código</label><input name="code" placeholder="Ex: NOVO123" maxlength="6" style="text-transform: uppercase" required></div>
                <div class="form-group"><label>Novo Valor de Desconto</label><input type="number" step="0.01" name="discountValue" required></div>
                <div class="form-group"><label>Nova Data de Expiração</label><input type="date" name="expirationDate" required></div>
                <div class="actions" style="justify-content: flex-end; margin-top: 2rem">
                    <button type="button" class="btn btn-outline" onclick="closeModals()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Confirmar Teste</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast">Notificação de Sistema</div>
    <script src="app.js"></script>
</body>
</html>
