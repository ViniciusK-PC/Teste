<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupon Master | Gestão de Descontos</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>Coupon Master</h1>
                <p style="color: var(--text-muted)">Painel de Controle de Ofertas</p>
            </div>
            <button class="btn btn-primary" onclick="openModal()">
                <i data-lucide="plus"></i>
                Novo Cupom
            </button>
        </header>

        <main class="coupon-grid" id="couponGrid">
            <!-- Os cupons serão carregados aqui via JS -->
            <div style="text-align: center; grid-column: 1/-1; padding: 3rem; color: var(--text-muted)">
                Carregando cupons...
            </div>
        </main>
    </div>

    <!-- Modal Novo Cupom -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 style="margin-bottom: 2rem">Cadastrar Oferta</h2>
            <form id="couponForm">
                <div class="form-group">
                    <label>Código do Cupom</label>
                    <input type="text" name="code" placeholder="Ex: VERAO2026" required>
                </div>
                <div class="form-group">
                    <label>Valor do Desconto (R$)</label>
                    <input type="number" step="0.01" name="discountValue" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Data de Expiração</label>
                    <input type="date" name="expirationDate" required>
                </div>
                <div class="actions" style="justify-content: flex-end; margin-top: 2rem">
                    <button type="button" class="btn" onclick="closeModal()" style="color: var(--text-muted)">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Cupom</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Mensagem aqui</div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="app.js"></script>
</body>
</html>
